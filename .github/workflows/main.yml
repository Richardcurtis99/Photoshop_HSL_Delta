
name: main

on:
  workflow_dispatch:
    inputs:
      reference:
        description: 'Input hex colour (e.g. #2d308b)'
        required: true
        type: string
      target:
        description: 'Output hex colour (e.g. #e1aacb)'
        required: true
        type: string

jobs:
  calculate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run HSL Delta
        id: delta
        run: |
          node -e "
            const { photoshopHslDelta } = require('./index');
            const delta = photoshopHslDelta('${{ inputs.reference }}', '${{ inputs.target }}');
            console.log('RESULT=' + JSON.stringify(delta));
          " | tee output.txt

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: hsl-delta-result
          path: output.txt
